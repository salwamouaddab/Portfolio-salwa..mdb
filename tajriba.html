<style>
:root {
  --black: #111;
  --white: #fff;
  --red-dark: #5a1111;
  --red-footer: #541c1c;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: Montserrat, system-ui, Arial, sans-serif;
  color: black;
  margin: 0;
}

/* Navbar */
nav {
  background-color: rgba(93, 4, 4, 0.9); /* شوية شفافية باش يبان الفيديو تحته */
  position: fixed;
  width: 100%;
  z-index: 2;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin: 0;
}

nav ul li a {
  display: block;
  padding: 14px 20px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav ul li a:hover {
  background-color: #555;
}

/* Hero Section */
.wrap {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Video full screen */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1; /* باش المحتوى يبان فوق الفيديو */
}

/* Overlay content */
.label {
  position: relative;
  z-index: 1;
  text-align: center;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  color: white;
}

.label .block {
  font-size: 45px;
  font-weight: bold;
  letter-spacing: 3px;
}

.label .small {
  font-size: 50px;
  color: var(--white);
}

/* Button */
.label a {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 30px;
  background: var(--black);
  color: white;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  transition: 0.3s;
}

.label a:hover {
  background: var(--red-dark);
}

/* Footer */
.footer {
  background: var(--red-footer);
  color: white;
  padding: 60px 40px;
}

.footer-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 40px;
}

.footer-col h3 {
  margin-bottom: 15px;
}

.footer-col ul {
  list-style: none;
}

.footer-col ul li {
  margin-bottom: 10px;
}

.footer-col ul li a {
  color: white;
  text-decoration: none;
}

.footer-col ul li a:hover {
  text-decoration: underline;
}

.newsletter {
  display: flex;
  margin-top: 10px;
}

.newsletter input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px 0 0 5px;
}

.newsletter button {
  padding: 10px 15px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 0 5px 5px 0;
}

.scroll-top {
  width: 40px;
  height: 40px;
  background: white;
  color: var(--red-dark);
  text-align: center;
  line-height: 40px;
  margin: 40px auto 0;
  border-radius: 5px;
}

.scroll-top a {
  text-decoration: none;
  color: var(--red-dark);
  font-weight: bold;
}
</style>
</head>

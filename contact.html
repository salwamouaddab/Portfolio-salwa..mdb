<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bijouterie Saloua</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --beige-gold: #f1e5d3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }

        /* Navbar Beige Gold */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 100;
            background-color: var(--beige-gold);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--black);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--black);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Contact Section */
        .contact-container {
            margin-top: 150px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 80vh;
        }

        .contact-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--beige-gold);
            text-transform: uppercase;
        }

        .contact-info {
            text-align: center;
            margin-bottom: 50px;
            color: #ccc;
        }

        /* Formulaire */
        form {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--beige-gold);
        }

        input, textarea {
            background: transparent;
            border: 1px solid var(--beige-gold);
            padding: 15px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            background: rgba(241, 229, 211, 0.05);
        }

        .btn-send {
            background-color: var(--beige-gold);
            color: var(--black);
            padding: 15px;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .btn-send:hover {
            background-color: var(--white);
            letter-spacing: 2px;
        }

        /* Footer */
        .footer {
            background-color: var(--beige-gold);
            color: var(--black);
            padding: 60px 40px;
            margin-top: 80px;
        }

        .footer-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BIJOUTERIE SALOUA</div>
        <nav>
            <ul>
                <li><a href="tajriba.html">ACCUEIL</a></li>
                <li><a href="apropos.html">À PROPOS</a></li>
                <li><a href="decouvrir.html">SERVICES</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-container">
        <h1>Contactez-nous</h1>
        <div class="contact-info">
            <p>Une question ? Un projet sur mesure ?</p>
            <p>Nous sommes à votre écoute pour vous conseiller.</p>
        </div>

        <form>
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Votre nom...">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com">
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Comment pouvons-nous vous aider ?"></textarea>
            </div>
            <button type="submit" class="btn-send">Envoyer le message</button>
        </form>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-col">
                <h3>Bijouterie Saloua</h3>
                <p>Or 18 Carats & Bijoux de Prestige.</p>
            </div>
            <div class="footer-col">
                <h3>Réseaux Sociaux</h3>
                <p>Instagram | Facebook</p>
            </div>
        </div>
    </footer>

</body>
</html>
